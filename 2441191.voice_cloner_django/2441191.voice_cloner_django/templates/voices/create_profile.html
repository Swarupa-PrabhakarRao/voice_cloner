{% extends 'base.html' %}

{% block title %}Create Profile - Voice Cloner{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">
                    <i class="bi bi-folder-plus"></i> Create Voice Profile
                </h2>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-circle"></i> Create Profile
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
